    background-size: cover;
    background-position: center bottom;
    filter: brightness(0.82);
    transition: filter 1.2s ease;
  }
  .bg.dimmed { filter: brightness(0.45) blur(4px); }

  /* Overlay gradient at bottom */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0) 40%,
      rgba(0,0,0,0.55) 100%
    );
  }

  /* Password card */
  .card {
    position: fixed;
    top: 0;
    right: 0;
    z-index: 10;
    padding: 28px 32px;
  }

  .card-inner {
    background: rgba(255,255,255,0.55);
    backdrop-filter: blur(20px) saturate(1.3);
    -webkit-backdrop-filter: blur(20px) saturate(1.3);
    border: 1px solid rgba(255,255,255,0.60);
    border-radius: 16px;
    padding: 24px 28px 26px;
    text-align: center;
    width: 240px;
    box-shadow: 0 12px 40px rgba(0,0,0,0.20);
    transition: transform 0.3s ease, opacity 0.3s ease;
  }

  .heart {
    font-size: 20px;
    margin-bottom: 8px;
    display: block;
    animation: pulse 2.2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.18); }
  }

  .card-title {
    color: #2d2d2d;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 3px;
    font-family: 'Georgia', serif;
  }

  .card-sub {
    color: #555;
    font-size: 10px;
    letter-spacing: 1px;
    margin-bottom: 20px;
    font-style: italic;
  }

  .pw-wrap {
    position: relative;
    margin-bottom: 12px;
  }

  input[type="password"] {
    width: 100%;
    padding: 11px 14px;
    border-radius: 8px;
    border: 1.5px solid rgba(0,0,0,0.15);
    background: rgba(255,255,255,0.70);
    color: #2d2d2d;
    font-size: 15px;
    letter-spacing: 6px;
    text-align: center;
    outline: none;
    transition: border 0.2s, background 0.2s;
    caret-color: #2d2d2d;
  }
  input[type="password"]::placeholder {
    letter-spacing: 2px;
    font-size: 11px;
    color: rgba(0,0,0,0.35);
  }
  input[type="password"]:focus {
    border-color: rgba(0,0,0,0.30);
    background: rgba(255,255,255,0.90);
  }
  input[type="password"].shake {
    animation: shake 0.4s ease;
    border-color: rgba(200,60,60,0.6);
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-5px); }
    80% { transform: translateX(5px); }
  }

  .btn {
    width: 100%;
    padding: 11px;
    border-radius: 8px;
    border: none;
    background: #2d2d2d;
    color: #fff;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: background 0.2s, transform 0.1s;
  }
  .btn:hover { background: #1a1a1a; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .error-msg {
    color: rgba(180,40,40,0.85);
    font-size: 10px;
    letter-spacing: 1px;
    margin-top: 10px;
    height: 14px;
    transition: opacity 0.3s;
    font-style: italic;
  }

  /* Success / reveal animation */
  .card.hidden {
    animation: fadeOut 0.6s ease forwards;
  }
  @keyframes fadeOut {
    to { opacity: 0; pointer-events: none; }
  }

  /* Itinerary iframe reveal */
  .reveal-frame {
    position: fixed;
    inset: 0;
    z-index: 5;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s ease 0.4s;
  }
  .reveal-frame.show {
    opacity: 1;
    pointer-events: all;
  }
  .reveal-frame iframe {
    width: 100%;
    height: 100%;
    border: none;
  }

  /* Mobile */
  @media (max-width: 480px) {
    .card { padding: 16px; }
    .card-inner { width: 200px; padding: 20px 20px 22px; }
  }
</style>
</head>
<body>

<div class="bg" id="bg"></div>

<div class="card" id="card">
  <div class="card-inner">
    <span class="heart">🤍</span>
    <div class="card-title">Butler Travels</div>
    <div class="card-sub">enter password to continue</div>

    <div class="pw-wrap">
      <input type="password" id="pw" placeholder="Password" autocomplete="off" autocorrect="off" spellcheck="false" maxlength="20">
    </div>

    <button class="btn" onclick="check()">Open</button>
    <div class="error-msg" id="err"></div>
  </div>
</div>

<div class="reveal-frame" id="reveal">
  <iframe src="itinerary.html" id="frame"></iframe>
</div>

<script>
  const input = document.getElementById('pw');
  const err   = document.getElementById('err');
  const card  = document.getElementById('card');
  const bg    = document.getElementById('bg');
  const reveal = document.getElementById('reveal');

  // Allow Enter key
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') check();
    err.textContent = '';
    input.classList.remove('shake');
  });

  function check() {
    const val = input.value.trim().toUpperCase();
    if (val === 'LOVE') {
      // Dim background, fade out card, reveal itinerary
      bg.classList.add('dimmed');
      card.classList.add('hidden');
      startMusic();
      setTimeout(() => {
        reveal.classList.add('show');
      }, 400);
    } else {
      input.classList.remove('shake');
      void input.offsetWidth; // reflow to restart animation
      input.classList.add('shake');
      err.textContent = 'Incorrect password — try again';
      input.value = '';
    }
  }

  // Auto-focus on load
  window.addEventListener('load', () => setTimeout(() => input.focus(), 300));

  // Music - plays on unlock
  function startMusic() {
    const existing = document.getElementById('yt-music');
    if (existing) return;
    const iframe = document.createElement('iframe');
    iframe.id = 'yt-music';
    iframe.style.cssText = 'position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;';
    // Dean Martin - Volare
    iframe.src = 'https://www.youtube.com/embed/pNdgFDDokRo?autoplay=1&loop=1&playlist=pNdgFDDokRo&controls=0&mute=0';
    iframe.allow = 'autoplay';
    document.body.appendChild(iframe);
  }
</script>

</body>
</html>
